<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<title>Pestforce Nederland — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#0A0A0A;
    --paper:#F5F1EB;
    --mute:#8A8A87;
    --line:rgba(245,241,235,.18);
    --line-strong:rgba(245,241,235,.42);
    --lead:#D7D3CC;
    --body:#C9C5BE;
    --soft:#B8B4AC;
    --softer:#A8A49C;
    --hover-bg:rgba(245,241,235,.04);
    --nav-bg:rgba(10,10,10,.92);
    --serif:"DM Serif Display","Times New Roman",serif;
    --sans:"DM Sans",system-ui,sans-serif;
    --pad:clamp(20px, 4vw, 48px);
    --maxw:1360px;
    --status-nieuw:#E8C063;
    --status-gebeld:#9DB7DB;
    --status-ingepland:#A6C8A2;
    --status-afgerond:#7B7B78;
    --status-geannuleerd:#B98787;
  }
  [data-theme="light"]{
    --ink:#F5F1EB; --paper:#0A0A0A; --mute:#6B6B68;
    --line:rgba(10,10,10,.16); --line-strong:rgba(10,10,10,.42);
    --lead:#2A2A28; --body:#3A3A37; --soft:#4A4A47; --softer:#5A5A57;
    --hover-bg:rgba(10,10,10,.04); --nav-bg:rgba(245,241,235,.94);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--ink);color:var(--paper);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  body{font-size:15px;line-height:1.55;font-weight:400}
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--paper);color:var(--ink)}

  .wrap{max-width:var(--maxw);margin:0 auto;padding-left:var(--pad);padding-right:var(--pad)}
  .num{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--mute);font-weight:500}
  h1,h2,h3{margin:0;font-family:var(--serif);font-weight:400;letter-spacing:-.02em;line-height:.98}

  /* top bar */
  nav.top{position:sticky;top:0;z-index:30;background:var(--nav-bg);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  nav.top .row{display:flex;align-items:center;justify-content:space-between;height:64px;gap:24px}
  .brand{display:flex;align-items:center;gap:12px;font-family:var(--serif);font-size:18px;letter-spacing:-.01em}
  .brand .mark{width:38px;height:20px;color:var(--paper);flex:none}
  .brand .mark path,.brand .mark ellipse,.brand .mark circle{vector-effect:non-scaling-stroke}
  .brand small{color:var(--mute);font-family:var(--sans);font-size:11px;letter-spacing:.22em;text-transform:uppercase;font-weight:500;margin-left:8px}
  .nav-right{display:flex;align-items:center;gap:18px;font-size:12px;color:var(--mute)}
  .nav-right .who{letter-spacing:.04em}
  .ghost-btn{appearance:none;background:transparent;border:1px solid var(--line-strong);color:var(--paper);font:inherit;font-size:11px;letter-spacing:.22em;text-transform:uppercase;padding:8px 16px;border-radius:999px;cursor:pointer;transition:background .25s,color .25s;font-weight:500;font-family:var(--sans)}
  .ghost-btn:hover{background:var(--paper);color:var(--ink)}
  .theme-toggle{appearance:none;border:1px solid var(--line-strong);background:transparent;color:var(--paper);width:44px;height:32px;border-radius:999px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;padding:0;position:relative;transition:background .25s,border-color .25s}
  .theme-toggle:hover{background:var(--hover-bg)}
  .theme-toggle svg{width:14px;height:14px;stroke:var(--paper);fill:none;stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round;transition:opacity .3s, transform .4s cubic-bezier(.2,.7,.2,1);position:absolute}
  .theme-toggle .sun{opacity:0;transform:rotate(-40deg) scale(.7)}
  .theme-toggle .moon{opacity:1;transform:rotate(0) scale(1)}
  [data-theme="light"] .theme-toggle .sun{opacity:1;transform:rotate(0) scale(1)}
  [data-theme="light"] .theme-toggle .moon{opacity:0;transform:rotate(40deg) scale(.7)}

  /* views */
  .view{display:none}
  .view.active{display:block}

  /* login */
  .login{min-height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center;padding:80px 24px}
  .login-card{max-width:440px;width:100%}
  .login-card h1{font-size:clamp(36px,5vw,56px);margin-bottom:18px}
  .login-card .lead{color:var(--lead);font-weight:300;line-height:1.6;margin:0 0 36px;max-width:38ch}
  .login-form{display:flex;flex-direction:column;gap:20px;border-top:1px solid var(--line);padding-top:32px}
  .login-form label{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--mute);font-weight:500;display:block;margin-bottom:8px}
  .login-form input{appearance:none;background:transparent;border:0;border-bottom:1px solid var(--line);color:var(--paper);font:inherit;font-size:18px;padding:10px 0;width:100%;border-radius:0;font-family:var(--sans)}
  .login-form input:focus{outline:0;border-bottom-color:var(--paper)}
  .btn{display:inline-flex;align-items:center;gap:14px;padding:16px 24px;background:var(--paper);color:var(--ink);font-size:12px;letter-spacing:.14em;text-transform:uppercase;font-weight:500;border:0;cursor:pointer;border-radius:999px;transition:transform .35s cubic-bezier(.2,.7,.2,1);font-family:var(--sans);align-self:flex-start}
  .btn:hover{transform:translateY(-2px)}
  .btn[disabled]{opacity:.55;cursor:not-allowed;transform:none}
  .login-msg{font-size:13px;line-height:1.55;color:var(--soft);border-left:1px solid var(--line-strong);padding:8px 0 8px 14px;margin-top:8px}
  .login-msg.error{color:var(--paper);border-left-color:var(--status-geannuleerd)}
  .login-msg[hidden]{display:none}

  /* dashboard */
  .dash{padding:48px 0 120px}
  .dash-head{display:flex;align-items:flex-end;justify-content:space-between;gap:32px;margin-bottom:36px;flex-wrap:wrap}
  .dash-head h1{font-size:clamp(36px,5vw,64px)}
  .stats{display:flex;gap:8px;flex-wrap:wrap}
  .stat-btn{appearance:none;background:transparent;border:1px solid var(--line);color:var(--paper);font:inherit;font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-weight:500;padding:10px 14px;cursor:pointer;border-radius:999px;display:inline-flex;align-items:center;gap:8px;transition:background .25s,border-color .25s,color .25s;font-family:var(--sans)}
  .stat-btn:hover{border-color:var(--line-strong)}
  .stat-btn[aria-pressed="true"]{background:var(--paper);color:var(--ink);border-color:var(--paper)}
  .stat-btn .count{background:rgba(10,10,10,.08);padding:1px 7px;border-radius:999px;font-size:11px;letter-spacing:0}
  .stat-btn:not([aria-pressed="true"]) .count{background:var(--hover-bg);color:var(--mute)}

  .table{display:flex;flex-direction:column;border-top:1px solid var(--line)}
  .row-empty{padding:64px 0;text-align:center;color:var(--mute);font-size:14px;border-bottom:1px solid var(--line)}
  .req{display:grid;grid-template-columns:120px 1.4fr 1fr 1fr 130px 100px;gap:24px;align-items:center;padding:20px 0;border-bottom:1px solid var(--line);cursor:pointer;transition:padding .25s,background .25s;text-align:left;width:100%;background:transparent;border-left:0;border-right:0;border-top:0;color:inherit;font:inherit;font-family:var(--sans)}
  .req:hover{padding-left:12px;background:var(--hover-bg)}
  .req .col-status{display:flex;align-items:center;gap:10px}
  .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--status-nieuw)}
  .status-nieuw .status-dot{background:var(--status-nieuw)}
  .status-gebeld .status-dot{background:var(--status-gebeld)}
  .status-ingepland .status-dot{background:var(--status-ingepland)}
  .status-afgerond .status-dot{background:var(--status-afgerond)}
  .status-geannuleerd .status-dot{background:var(--status-geannuleerd)}
  .status-label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--mute);font-weight:500}
  .req .col-name{font-family:var(--serif);font-size:20px;letter-spacing:-.01em;line-height:1.1}
  .req .col-name small{display:block;font-family:var(--sans);font-size:12px;color:var(--mute);font-weight:400;margin-top:4px;letter-spacing:.02em;line-height:1.4}
  .req .col-type{font-size:13px;color:var(--body)}
  .req .col-when{font-size:13px;color:var(--soft);font-variant-numeric:tabular-nums}
  .req .col-urgency{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--mute);font-weight:500}
  .req .col-age{font-size:12px;color:var(--mute);text-align:right;font-variant-numeric:tabular-nums}
  @media (max-width:900px){
    .req{grid-template-columns:1fr;gap:8px}
    .req .col-age{text-align:left}
  }

  /* drawer */
  .drawer{position:fixed;top:0;right:0;bottom:0;width:min(540px,100vw);background:var(--ink);border-left:1px solid var(--line);transform:translateX(100%);transition:transform .35s cubic-bezier(.2,.7,.2,1);z-index:50;display:flex;flex-direction:column;overflow:hidden}
  .drawer.open{transform:translateX(0)}
  .drawer-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:49;opacity:0;pointer-events:none;transition:opacity .35s}
  .drawer-backdrop.open{opacity:1;pointer-events:auto}
  [data-theme="light"] .drawer-backdrop{background:rgba(10,10,10,.25)}

  .drawer-head{padding:24px var(--pad);display:flex;align-items:center;justify-content:space-between;gap:16px;border-bottom:1px solid var(--line);flex-shrink:0}
  .drawer-head .num{font-size:11px}
  .icon-btn{appearance:none;background:transparent;border:1px solid var(--line-strong);color:var(--paper);width:32px;height:32px;border-radius:999px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:18px;line-height:1;font-family:var(--sans);transition:background .25s,color .25s}
  .icon-btn:hover{background:var(--paper);color:var(--ink)}

  .drawer-body{flex:1;overflow:auto;padding:32px var(--pad)}
  .drawer-body h2{font-size:clamp(28px,3.6vw,44px);margin-bottom:6px}
  .drawer-body .meta{color:var(--mute);font-size:12px;letter-spacing:.04em;margin:0 0 28px}

  .kv{display:grid;grid-template-columns:120px 1fr;gap:14px 24px;border-top:1px solid var(--line);padding-top:20px}
  .kv dt{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--mute);font-weight:500;margin:0;padding:10px 0}
  .kv dd{margin:0;padding:10px 0;border-bottom:1px solid var(--line);color:var(--lead);font-size:15px;line-height:1.5;word-break:break-word}
  .kv dt.kv-line{border-bottom:1px solid var(--line)}
  .kv dd a{color:var(--paper);border-bottom:1px solid var(--line);transition:border-color .25s}
  .kv dd a:hover{border-color:var(--paper)}

  .drawer-section{margin-top:32px}
  .drawer-section .label{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--mute);font-weight:500;display:block;margin-bottom:12px}
  .drawer-section select,.drawer-section textarea{appearance:none;background:transparent;border:1px solid var(--line);color:var(--paper);font:inherit;font-size:14px;padding:12px 14px;width:100%;border-radius:0;font-family:var(--sans);transition:border-color .25s}
  .drawer-section select:focus,.drawer-section textarea:focus{outline:0;border-color:var(--paper)}
  .drawer-section select option{background:var(--ink);color:var(--paper)}
  .drawer-section textarea{resize:vertical;min-height:90px;line-height:1.55}

  .drawer-foot{padding:20px var(--pad);border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-shrink:0}
  .save-state{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--mute);font-weight:500}
  .danger-link{appearance:none;background:transparent;border:0;color:var(--mute);font:inherit;font-size:11px;letter-spacing:.22em;text-transform:uppercase;cursor:pointer;font-weight:500;padding:6px 0;font-family:var(--sans);transition:color .25s}
  .danger-link:hover{color:var(--status-geannuleerd)}

  /* utility */
  .hidden{display:none !important}

  /* error/info */
  .toast{position:fixed;left:50%;bottom:32px;transform:translateX(-50%) translateY(20px);background:var(--paper);color:var(--ink);padding:12px 20px;border-radius:999px;font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-weight:500;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;z-index:60;font-family:var(--sans)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<nav class="top">
  <div class="wrap row">
    <a href="/" class="brand"><svg class="mark" viewBox="0 0 160 80" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M40 36 C 30 22 22 16 14 14"/><path d="M40 36 C 32 28 24 24 18 24"/><ellipse cx="44" cy="40" rx="7" ry="6"/><circle cx="42" cy="40" r="1.2" fill="currentColor" stroke="none"/><ellipse cx="62" cy="42" rx="10" ry="9"/><ellipse cx="106" cy="46" rx="28" ry="11"/><path d="M92 36 Q 92 46 91 56"/><path d="M104 35 Q 104 46 105 57"/><path d="M116 36 Q 116 46 117 56"/><path d="M127 38 Q 127 46 127 54"/><path d="M56 33 Q 60 14 84 18 Q 78 33 66 33"/></svg><span>Pestforce<small>Admin</small></span></a>
    <div class="nav-right" id="navRight">
      <button id="themeToggle" class="theme-toggle" type="button" aria-label="Wissel licht/donker" title="Wissel licht/donker">
        <svg class="moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 14.5A8 8 0 0 1 9.5 4a8 8 0 1 0 10.5 10.5z"/></svg>
        <svg class="sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4 7 17M17 7l1.4-1.4"/></svg>
      </button>
    </div>
  </div>
</nav>

<!-- LOGIN VIEW -->
<section class="view" id="loginView">
  <div class="login">
    <div class="login-card">
      <span class="num" style="display:block;margin-bottom:14px">— Magic-link login</span>
      <h1>Inloggen.</h1>
      <p class="lead">Voer uw e-mailadres in. Als het op de adminlijst staat, krijgt u een eenmalige inloglink toegestuurd.</p>
      <form class="login-form" id="loginForm" novalidate>
        <div>
          <label for="loginEmail">E-mailadres</label>
          <input id="loginEmail" type="email" required autocomplete="email" placeholder="naam@voorbeeld.nl" />
        </div>
        <button type="submit" class="btn" id="loginSubmit">Stuur link</button>
        <div class="login-msg" id="loginMsg" hidden></div>
      </form>
    </div>
  </div>
</section>

<!-- DASHBOARD VIEW -->
<section class="view" id="dashView">
  <div class="dash wrap">
    <header class="dash-head">
      <div>
        <span class="num" style="display:block;margin-bottom:8px">— Aanvragen</span>
        <h1>Inbox.</h1>
      </div>
      <div class="stats" id="stats" role="tablist"></div>
    </header>
    <div class="table" id="reqTable">
      <div class="row-empty">Aan het laden…</div>
    </div>
  </div>
</section>

<!-- DRAWER -->
<div class="drawer-backdrop" id="drawerBackdrop"></div>
<aside class="drawer" id="drawer" aria-hidden="true">
  <div class="drawer-head">
    <span class="num" id="drawerRef"></span>
    <button type="button" class="icon-btn" id="drawerClose" aria-label="Sluiten">×</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-foot">
    <span class="save-state" id="saveState"></span>
    <button type="button" class="danger-link" id="deleteBtn">Verwijderen</button>
  </div>
</aside>

<div class="toast" id="toast"></div>

<script>
(function(){
  const $ = (s, p=document) => p.querySelector(s);
  const $$ = (s, p=document) => Array.from(p.querySelectorAll(s));

  // theme
  const root = document.documentElement;
  const stored = localStorage.getItem('pf-theme');
  const prefersLight = matchMedia('(prefers-color-scheme: light)').matches;
  if((stored || (prefersLight ? 'light' : 'dark')) === 'light') root.setAttribute('data-theme','light');
  $('#themeToggle').addEventListener('click', ()=>{
    const isLight = root.getAttribute('data-theme') === 'light';
    if(isLight){ root.removeAttribute('data-theme'); localStorage.setItem('pf-theme','dark'); }
    else { root.setAttribute('data-theme','light'); localStorage.setItem('pf-theme','light'); }
  });

  function show(view){
    $$('.view').forEach(v => v.classList.toggle('active', v.id === view));
  }

  function toast(msg, ms=2200){
    const t = $('#toast'); t.textContent = msg; t.classList.add('show');
    clearTimeout(toast._t); toast._t = setTimeout(()=>t.classList.remove('show'), ms);
  }

  // URL error decoding
  const params = new URLSearchParams(location.search);
  const urlError = params.get('error');
  const ERROR_MAP = {
    missing_token: 'Geen token in de link.',
    invalid_or_expired: 'Deze link is niet meer geldig (of al gebruikt).',
    not_admin: 'Dit adres staat niet op de adminlijst.',
    server_not_configured: 'Server-configuratie ontbreekt — neem contact op met de beheerder.',
    server: 'Er ging iets mis op de server.'
  };

  // Boot: check session
  fetch('/api/me').then(r=>r.json()).then(s => {
    if(s.authenticated) initDashboard(s.email);
    else initLogin(urlError);
  }).catch(()=>initLogin('server'));

  /* ---------- LOGIN ---------- */
  function initLogin(error){
    show('loginView');
    if(error){
      const msg = $('#loginMsg');
      msg.textContent = ERROR_MAP[error] || 'Er ging iets mis.';
      msg.classList.add('error');
      msg.hidden = false;
    }
    $('#loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = $('#loginSubmit');
      const email = $('#loginEmail').value.trim();
      const msg = $('#loginMsg');
      msg.classList.remove('error'); msg.hidden = true;
      if(!email){ return; }
      btn.disabled = true; btn.textContent = 'Bezig…';
      try {
        const r = await fetch('/api/auth-request', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        if(!r.ok) throw 0;
      } catch(_){}
      btn.textContent = 'Stuur link';
      btn.disabled = false;
      msg.textContent = 'Als dit adres op de adminlijst staat, ligt er nu een inloglink in uw inbox. De link is 15 minuten geldig.';
      msg.hidden = false;
    });
  }

  /* ---------- DASHBOARD ---------- */
  const STATUSES = [
    { key: 'alle',         label: 'Alle' },
    { key: 'nieuw',        label: 'Nieuw' },
    { key: 'gebeld',       label: 'Gebeld' },
    { key: 'ingepland',    label: 'Ingepland' },
    { key: 'afgerond',     label: 'Afgerond' },
    { key: 'geannuleerd',  label: 'Geannuleerd' }
  ];
  const EDITABLE_STATUSES = STATUSES.slice(1);

  let allRequests = [];
  let currentFilter = 'alle';
  let currentRecord = null;

  function initDashboard(email){
    show('dashView');
    const nav = $('#navRight');
    nav.innerHTML = `
      <span class="who">${esc(email)}</span>
      <button id="themeToggle" class="theme-toggle" type="button" aria-label="Wissel licht/donker" title="Wissel licht/donker">
        <svg class="moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 14.5A8 8 0 0 1 9.5 4a8 8 0 1 0 10.5 10.5z"/></svg>
        <svg class="sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4 7 17M17 7l1.4-1.4"/></svg>
      </button>
      <button id="logoutBtn" class="ghost-btn" type="button">Uitloggen</button>
    `;
    nav.querySelector('#themeToggle').addEventListener('click', ()=>{
      const isLight = root.getAttribute('data-theme') === 'light';
      if(isLight){ root.removeAttribute('data-theme'); localStorage.setItem('pf-theme','dark'); }
      else { root.setAttribute('data-theme','light'); localStorage.setItem('pf-theme','light'); }
    });
    nav.querySelector('#logoutBtn').addEventListener('click', async ()=>{
      await fetch('/api/logout', { method: 'POST' });
      location.reload();
    });
    loadRequests();
    $('#drawerClose').addEventListener('click', closeDrawer);
    $('#drawerBackdrop').addEventListener('click', closeDrawer);
    $('#deleteBtn').addEventListener('click', deleteCurrent);
    document.addEventListener('keydown', e => { if(e.key === 'Escape') closeDrawer(); });
  }

  async function loadRequests(){
    try {
      const r = await fetch('/api/requests');
      if(r.status === 401){ initLogin(); return; }
      const j = await r.json();
      allRequests = j.requests || [];
      renderStats(); renderTable();
    } catch(err){
      $('#reqTable').innerHTML = '<div class="row-empty">Laden mislukt — herlaad de pagina.</div>';
    }
  }

  function renderStats(){
    const counts = {};
    STATUSES.forEach(s => counts[s.key] = 0);
    counts.alle = allRequests.length;
    allRequests.forEach(r => { counts[r.status] = (counts[r.status]||0) + 1; });
    const html = STATUSES.map(s => `
      <button class="stat-btn" data-key="${s.key}" aria-pressed="${currentFilter===s.key}">
        ${s.label}<span class="count">${counts[s.key]||0}</span>
      </button>
    `).join('');
    const el = $('#stats');
    el.innerHTML = html;
    el.querySelectorAll('.stat-btn').forEach(b => b.addEventListener('click', () => {
      currentFilter = b.dataset.key;
      renderStats(); renderTable();
    }));
  }

  function renderTable(){
    const list = currentFilter === 'alle' ? allRequests : allRequests.filter(r => r.status === currentFilter);
    if(!list.length){
      $('#reqTable').innerHTML = `<div class="row-empty">Geen aanvragen ${currentFilter==='alle'?'':'in deze status'}.</div>`;
      return;
    }
    $('#reqTable').innerHTML = list.map(r => {
      const when = r.datum ? r.datum + (r.tijd ? ' · ' + r.tijd : '') : '<span style="color:var(--mute)">Telefonisch</span>';
      return `<button type="button" class="req status-${esc(r.status)}" data-id="${esc(r.id)}">
        <div class="col-status"><span class="status-dot"></span><span class="status-label">${esc(r.status)}</span></div>
        <div class="col-name">${esc(r.naam)}<small>${esc(r.bedrijf || r.email)}</small></div>
        <div class="col-type">${esc(r.type)}</div>
        <div class="col-when">${when}</div>
        <div class="col-urgency">${esc(r.urgentie || '—')}</div>
        <div class="col-age">${formatAge(r.created)}</div>
      </button>`;
    }).join('');
    $('#reqTable').querySelectorAll('.req').forEach(b => b.addEventListener('click', () => {
      const rec = allRequests.find(r => r.id === b.dataset.id);
      if(rec) openDrawer(rec);
    }));
  }

  function formatAge(iso){
    if(!iso) return '';
    const d = new Date(iso); const now = Date.now();
    const diff = Math.max(0, now - d.getTime()) / 1000;
    if(diff < 60) return 'zojuist';
    if(diff < 3600) return Math.floor(diff/60) + ' min';
    if(diff < 86400) return Math.floor(diff/3600) + ' uur';
    if(diff < 86400*7) return Math.floor(diff/86400) + ' dgn';
    return d.toLocaleDateString('nl-NL', { day:'numeric', month:'short' });
  }

  function openDrawer(rec){
    currentRecord = rec;
    $('#drawerRef').textContent = '— Ref ' + rec.id;
    const created = rec.created ? new Date(rec.created).toLocaleString('nl-NL') : '';
    const updated = rec.updated ? new Date(rec.updated).toLocaleString('nl-NL') : null;
    const when = rec.datum ? esc(rec.datum) + (rec.tijd ? ' om ' + esc(rec.tijd) : ' (tijd in overleg)') : 'Telefonisch overleggen';
    $('#drawerBody').innerHTML = `
      <h2>${esc(rec.naam)}</h2>
      <p class="meta">${esc(created)}${updated?` · bijgewerkt ${esc(updated)}${rec.updatedBy ? ' door '+esc(rec.updatedBy):''}`:''}</p>
      <dl class="kv">
        ${rec.bedrijf ? row('Bedrijf', esc(rec.bedrijf)) : ''}
        ${row('E-mail',    `<a href="mailto:${esc(rec.email)}">${esc(rec.email)}</a>`)}
        ${row('Telefoon',  `<a href="tel:${esc(rec.telefoon)}">${esc(rec.telefoon)}</a>`)}
        ${row('Adres',     esc(rec.adres))}
        ${row('Type',      esc(rec.type))}
        ${row('Urgentie',  esc(rec.urgentie || '—'))}
        ${row('Voorkeur',  when)}
        ${rec.bericht ? row('Beschrijving', `<span style="white-space:pre-wrap">${esc(rec.bericht)}</span>`) : ''}
      </dl>
      <div class="drawer-section">
        <span class="label">Status</span>
        <select id="statusSelect">
          ${EDITABLE_STATUSES.map(s => `<option value="${s.key}" ${s.key===rec.status?'selected':''}>${s.label}</option>`).join('')}
        </select>
      </div>
      <div class="drawer-section">
        <span class="label">Interne notitie</span>
        <textarea id="noteInput" rows="3" placeholder="Telefonisch overleg, terugbeltijd, bijzonderheden…">${esc(rec.note || '')}</textarea>
      </div>
    `;
    $('#statusSelect').addEventListener('change', save);
    $('#noteInput').addEventListener('input', debounce(save, 600));
    $('#drawer').classList.add('open'); $('#drawer').setAttribute('aria-hidden','false');
    $('#drawerBackdrop').classList.add('open');
  }

  function closeDrawer(){
    $('#drawer').classList.remove('open'); $('#drawer').setAttribute('aria-hidden','true');
    $('#drawerBackdrop').classList.remove('open');
    currentRecord = null;
  }

  async function save(){
    if(!currentRecord) return;
    const status = $('#statusSelect').value;
    const note = $('#noteInput').value;
    $('#saveState').textContent = 'Bezig met opslaan…';
    try {
      const r = await fetch('/api/requests', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: currentRecord.id, status, note })
      });
      if(!r.ok) throw 0;
      const j = await r.json();
      const idx = allRequests.findIndex(x => x.id === j.request.id);
      if(idx >= 0) allRequests[idx] = j.request;
      currentRecord = j.request;
      $('#saveState').textContent = 'Opgeslagen';
      renderStats(); renderTable();
      setTimeout(()=>{ if($('#saveState')) $('#saveState').textContent=''; }, 1800);
    } catch(_){
      $('#saveState').textContent = 'Opslaan mislukt';
    }
  }

  async function deleteCurrent(){
    if(!currentRecord) return;
    if(!confirm(`Aanvraag van ${currentRecord.naam} definitief verwijderen?`)) return;
    try {
      const r = await fetch('/api/requests?id=' + encodeURIComponent(currentRecord.id), { method: 'DELETE' });
      if(!r.ok) throw 0;
      allRequests = allRequests.filter(x => x.id !== currentRecord.id);
      closeDrawer(); renderStats(); renderTable();
      toast('Verwijderd');
    } catch(_){
      toast('Verwijderen mislukt');
    }
  }

  function row(label, value){
    return `<dt>${label}</dt><dd>${value}</dd>`;
  }

  function esc(s){ return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
  function debounce(fn, ms){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a), ms); }; }
})();
</script>

</body>
</html>
